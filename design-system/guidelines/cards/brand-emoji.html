<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { padding: 16px 22px; background: var(--bg); margin: 0; display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; align-content: center; }
.ico { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 6px; text-align: center; }
.ico .e { font-size: 1.5rem; line-height: 1.3; }
.ico .l { font-size: .62rem; color: var(--text-3); font-weight: 700; }
</style>
</head>
<body>
<div class="ico"><div class="e">🏆</div><div class="l">البطولة / الشعار</div></div>
<div class="ico"><div class="e">⚽</div><div class="l">هدف / فريق</div></div>
<div class="ico"><div class="e">🟨</div><div class="l">إنذار</div></div>
<div class="ico"><div class="e">🟥</div><div class="l">طرد</div></div>
<div class="ico"><div class="e">🥇🥈🥉</div><div class="l">المراكز الأولى</div></div>
<div class="ico"><div class="e">🎯</div><div class="l">التوقّعات</div></div>
<div class="ico"><div class="e">🎁</div><div class="l">جائزة</div></div>
<div class="ico"><div class="e">📅</div><div class="l">البرنامج</div></div>
<div class="ico"><div class="e">🛡️</div><div class="l">البيت / المجموعة</div></div>
<div class="ico"><div class="e">👟</div><div class="l">هدّاف</div></div>
<div class="ico"><div class="e">🏟️</div><div class="l">مباريات</div></div>
<div class="ico"><div class="e">⚙️</div><div class="l">الإعدادات</div></div>
</body>
</html>
