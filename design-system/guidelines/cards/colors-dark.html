<!-- @dsCard group="Colors" viewport="700x170" name="الوضع الداكن" subtitle="data-theme=dark — كل الرموز تنقلب تلقائياً، الأزرق يُضاء" -->
<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { display: flex; gap: 10px; padding: 16px; background: var(--bg); margin: 0; align-items: stretch; }
.demo { flex: 1.5; }
.sw { flex: 1; border-radius: var(--radius); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; font-size: .68rem; font-weight: 700; border: 1px solid var(--border); line-height: 1.4; }
</style>
</head>
<body>
<div class="demo">
  <div class="match is-live" style="margin: 0;">
    <div class="time">18:00<span class="grp"><span class="badge badge-live"><span class="dot"></span>مباشر</span></span></div>
    <div class="match-center">
      <div class="team home"><span class="name">القعقاع</span></div>
      <div class="score">2<span class="sep">-</span>2</div>
      <div class="team away"><span class="name">عمر بن الخطاب</span></div>
    </div>
  </div>
  <div style="display: flex; gap: 8px; margin-top: 10px;">
    <button class="btn btn-primary">إدخال النتيجة</button>
    <button class="btn">إلغاء</button>
    <span class="badge badge-active" style="align-self: center;">جارية</span>
  </div>
</div>
<div class="sw" style="background: var(--brand); color: #fff;">brand<br>#4d82ff</div>
<div class="sw" style="background: var(--surface); color: var(--text);">surface<br>#121c33</div>
<div class="sw" style="background: var(--bg); color: var(--text-2);">bg<br>#0a1120</div>
</body>
</html>
