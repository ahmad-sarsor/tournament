<!-- @dsCard group="Brand" viewport="700x160" name="أيقونة التطبيق والعلامة" subtitle="لا شعار رسمي — 🏆 داخل مربّع متدرّج + اسم بخط العرض" -->
<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { padding: 16px 22px; background: var(--bg); margin: 0; display: flex; align-items: center; gap: 26px; }
.mark { display: flex; align-items: center; gap: 12px; }
.note { font-size: .78rem; color: var(--text-2); line-height: 1.8; max-width: 240px; }
img { border-radius: 18px; box-shadow: var(--shadow-sm); }
</style>
</head>
<body>
<div class="mark">
  <span class="logo" style="width: 56px; height: 56px; border-radius: 16px; background: var(--hero-gradient); display: grid; place-items: center; font-size: 1.7rem; color: #fff; box-shadow: 0 4px 14px -3px color-mix(in srgb, var(--brand) 60%, transparent);">🏆</span>
  <span style="font-family: var(--font-display); font-weight: 800; font-size: 1.5rem; color: var(--ink);">منصّة البطولات</span>
</div>
<img src="../../assets/img/icon-192.png" width="72" height="72" alt="أيقونة PWA من الريبو">
<div class="note">أيقونات الـPWA الأصلية في <b>assets/img/</b> (192/512/maskable). لا يوجد شعار مرسوم — العلامة = 🏆 داخل مربّع متدرّج + الاسم.</div>
</body>
</html>
