<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { display: flex; gap: 14px; padding: 18px 22px; background: var(--bg); margin: 0; align-items: flex-end; }
.sp { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: .68rem; font-weight: 700; color: var(--text-2); }
.bar { width: 34px; background: linear-gradient(180deg, var(--brand), var(--brand-strong)); border-radius: 6px; }
.note { margin-inline-start: auto; align-self: center; font-size: .78rem; color: var(--text-2); line-height: 1.8; font-weight: 500; max-width: 250px; }
</style>
</head>
<body>
<div class="sp"><div class="bar" style="height: 4px;"></div>sp-1<br>4</div>
<div class="sp"><div class="bar" style="height: 8px;"></div>sp-2<br>8</div>
<div class="sp"><div class="bar" style="height: 12px;"></div>sp-3<br>12</div>
<div class="sp"><div class="bar" style="height: 16px;"></div>sp-4<br>16</div>
<div class="sp"><div class="bar" style="height: 20px;"></div>sp-5<br>20</div>
<div class="sp"><div class="bar" style="height: 24px;"></div>sp-6<br>24</div>
<div class="sp"><div class="bar" style="height: 32px;"></div>sp-8<br>32</div>
<div class="sp"><div class="bar" style="height: 40px;"></div>sp-10<br>40</div>
<div class="note">حشوة البطاقات 20px · فجوة الشبكات 16px · الحاوية <b>1080px</b> بحشوة 18px · ارتفاع الرأس <b>60px</b></div>
</body>
</html>
