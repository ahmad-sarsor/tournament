<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { display: flex; gap: 10px; padding: 16px; background: var(--bg); margin: 0; }
.sw { flex: 1; height: 62px; border-radius: var(--radius-sm); border: 1px solid var(--border-2); display: grid; place-items: center; font-size: .68rem; font-weight: 700; }
.col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.txt { flex: 1; border-radius: var(--radius-sm); display: grid; place-items: center; font-weight: 800; font-size: .85rem; background: var(--surface); border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="col">
  <div class="sw" style="background: var(--bg); color: var(--text-2);">bg #f2f6fd</div>
  <div class="sw" style="background: var(--surface); color: var(--text-2);">surface #fff</div>
</div>
<div class="col">
  <div class="sw" style="background: var(--surface-2); color: var(--text-2);">surface-2</div>
  <div class="sw" style="background: var(--surface-3); color: var(--text-2);">surface-3</div>
</div>
<div class="col">
  <div class="sw" style="background: var(--surface); color: var(--text-3); border: 2px solid var(--border);">border</div>
  <div class="sw" style="background: var(--surface); color: var(--text-3); border: 2px solid var(--border-2);">border-2</div>
</div>
<div class="col">
  <div class="txt" style="color: var(--ink);">ink — عناوين</div>
  <div class="txt" style="color: var(--text);">text — نص</div>
</div>
<div class="col">
  <div class="txt" style="color: var(--text-2);">text-2 — ثانوي</div>
  <div class="txt" style="color: var(--text-3);">text-3 — خافت</div>
</div>
</body>
</html>
