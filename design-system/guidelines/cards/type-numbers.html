<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { padding: 16px 22px; background: var(--bg); margin: 0; display: flex; align-items: center; gap: 18px; }
.chunk { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; text-align: center; }
.lbl { font-size: .66rem; color: var(--text-3); font-weight: 700; margin-top: 4px; }
</style>
</head>
<body>
<div class="chunk">
  <div style="font-family: var(--font-display); font-weight: 800; font-size: 2rem; font-variant-numeric: tabular-nums; color: var(--ink); line-height: 1.1;">4 - 2</div>
  <div class="lbl">نتيجة — خط العرض 800</div>
</div>
<div class="chunk">
  <div style="font-weight: 700; font-size: 1.1rem; font-variant-numeric: tabular-nums;">17:00</div>
  <div class="lbl">توقيت 24 ساعة</div>
</div>
<div class="chunk">
  <div style="font-weight: 700; font-size: 1.1rem; font-variant-numeric: tabular-nums;">03/07/2026</div>
  <div class="lbl">تاريخ DD/MM/YYYY</div>
</div>
<div class="chunk">
  <div style="font-family: var(--font-display); font-weight: 800; font-size: 1.6rem; color: var(--brand); font-variant-numeric: tabular-nums;">10</div>
  <div class="lbl">نقاط — أزرق بخط العرض</div>
</div>
<div class="chunk">
  <div style="font-weight: 700; font-size: 1.1rem; font-variant-numeric: tabular-nums; color: var(--win);">+6</div>
  <div class="lbl">فارق موجب أخضر / سالب أحمر</div>
</div>
</body>
</html>
