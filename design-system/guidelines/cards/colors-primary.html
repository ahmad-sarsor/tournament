<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { display: flex; gap: 10px; padding: 16px; background: var(--bg); margin: 0; }
.sw { flex: 1; height: 116px; border-radius: var(--radius); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; font-size: .7rem; font-weight: 700; line-height: 1.45; border: 1px solid var(--border); }
.sw code { font-family: inherit; opacity: .75; font-weight: 500; }
</style>
</head>
<body>
<div class="sw" style="background: var(--brand-deep); color: #fff;">brand-deep<br><code>#13348f</code></div>
<div class="sw" style="background: var(--brand-strong); color: #fff;">brand-strong<br><code>#1e53e6</code></div>
<div class="sw" style="background: var(--brand); color: #fff; flex: 1.6;">brand<br><code>#2f6bff</code></div>
<div class="sw" style="background: var(--brand-softer); color: var(--brand-deep);">brand-softer<br><code>#d7e5ff</code></div>
<div class="sw" style="background: var(--brand-soft); color: var(--brand-deep);">brand-soft<br><code>#eaf1ff</code></div>
</body>
</html>
