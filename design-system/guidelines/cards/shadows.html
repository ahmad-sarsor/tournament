<!-- @dsCard group="Spacing" viewport="700x170" name="الظلال" subtitle="ناعمة للبطاقات + الظل الصلب «القابل للكبس» للأزرار" -->
<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
body { display: flex; gap: 16px; padding: 20px; background: var(--bg); margin: 0; align-items: center; }
.s { flex: 1; height: 96px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); display: grid; place-items: center; font-size: .72rem; font-weight: 700; color: var(--text-2); text-align: center; line-height: 1.5; }
.press { flex: 1; display: grid; place-items: center; gap: 6px; }
</style>
</head>
<body>
<div class="s" style="box-shadow: var(--shadow-xs);">shadow-xs<br>صفوف وبطاقات هادئة</div>
<div class="s" style="box-shadow: var(--shadow-sm);">shadow-sm<br>جداول</div>
<div class="s" style="box-shadow: var(--shadow-md);">shadow-md<br>تحويم ولوحات</div>
<div class="s" style="box-shadow: var(--shadow-lg);">shadow-lg<br>نوافذ وإشعارات</div>
<div class="press">
  <button class="btn btn-primary">اكبسني!</button>
  <span style="font-size: .68rem; color: var(--text-3); font-weight: 700;">shadow-press · 0 3px 0</span>
</div>
</body>
</html>
